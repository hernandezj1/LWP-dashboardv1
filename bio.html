<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<title>
Pedagogue Biography
</title>


<style>


:root {

--blue:#2563eb;
--bg:#f8fafc;
--text:#111827;
--muted:#6b7280;

}



body {

margin:0;

font-family:
-apple-system,
BlinkMacSystemFont,
"Segoe UI",
Roboto,
sans-serif;


background:var(--bg);

color:var(--text);

}



/* SEARCH AREA */


#container {


display:flex;

flex-direction:column;


width:100%;


padding:15px;

box-sizing:border-box;


background:white;


border-bottom:

1px solid #e5e7eb;


}



#searchBar {


width:100%;


box-sizing:border-box;


padding:12px 15px;


font-size:15px;


border-radius:10px;


border:

1px solid #d1d5db;


outline:none;



box-shadow:

0 3px 10px rgba(0,0,0,.08);



}



#searchBar:focus {


border-color:var(--blue);


}




/* DROPDOWN */


select#timelineSelector {


display:none;


margin-top:8px;


height:150px;


overflow:auto;


border-radius:10px;


border:1px solid #ddd;


}







/* TIMELINE */


#timelineIframe {


width:100%;


height:calc(100vh - 75px);


border:none;


background:white;


}





</style>


</head>




<body>



<div id="container">


<input

type="text"

id="searchBar"

placeholder="Search by pedagogue..."

onkeyup="filterOptions()"

onfocus="showDropdown()"


>



<select

id="timelineSelector"

onchange="changeTimeline()"

size="10">


</select>


</div>




<iframe

id="timelineIframe">

</iframe>







<script>





/* GET URL PARAMETER */


function getQueryParam(param){


const params =

new URLSearchParams(

window.location.search

);


return params.get(param);


}








/* LOAD CSV */


fetch(
'https://raw.githubusercontent.com/hernandezj1/LWP/refs/heads/main/links.csv'
)


.then(response=>response.text())


.then(csv=>{


const rows =
csv.split('\n');


const selector =

document.getElementById(
"timelineSelector"
);



rows.forEach(row=>{


const parts =
row.split(',');


const name =
parts[0];


const url =
parts[1];



if(name && url){


const option =
document.createElement("option");


option.text =
name.trim();


option.value =
extractSpreadsheetId(
url.trim()
);



selector.add(option);



}



});





const searchValue =

getQueryParam("search");





if(searchValue){



document

.getElementById("searchBar")

.value = searchValue;



filterOptions();


selectOptionByName(searchValue);



}

else{


if(selector.options.length>0)

selectOptionByName(
selector.options[0].text
);



}





})

.catch(error=>{


console.error(
"CSV loading error:",
error
);


});










/* EXTRACT GOOGLE SHEET ID */


function extractSpreadsheetId(url){


const regex =

/spreadsheets\/d\/([a-zA-Z0-9-_]+)/;



const match =
url.match(regex);



return match ? match[1] : "";

}









/* LOAD TIMELINE */


function changeTimeline(){


const selector =

document.getElementById(
"timelineSelector"
);



const id =

selector

.options[selector.selectedIndex]

.value;





const iframe =

document.getElementById(
"timelineIframe"
);




iframe.src =

`https://cdn.knightlab.com/libs/timeline3/latest/embed/index.html?source=${id}&font=Default&lang=en&initial_zoom=2&height=650`;




selector.style.display="none";



}









/* SELECT NAME */


function selectOptionByName(name){


const selector =

document.getElementById(
"timelineSelector"
);




for(
let i=0;
i<selector.options.length;
i++
){


if(

selector.options[i]

.text

.trim()

.toLowerCase()

===

name.trim().toLowerCase()


){


selector.selectedIndex=i;


changeTimeline();


break;


}



}



}









/* SEARCH FILTER */


function filterOptions(){


const input =

document.getElementById(
"searchBar"
);



const filter =

input.value.toLowerCase();



const selector =

document.getElementById(
"timelineSelector"
);



const options =
selector.options;




for(
let i=0;
i<options.length;
i++
){



const text =

options[i]

.text

.toLowerCase();




if(text.includes(filter)){


options[i].style.display="";


}

else{


options[i].style.display="none";


}



}



}










function showDropdown(){


document

.getElementById(
"timelineSelector"
)

.style.display="block";


}



</script>



</body>

</html>
