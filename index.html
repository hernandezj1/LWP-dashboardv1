<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<title>
Random Network of Pedagogues
</title>


<script src="https://d3js.org/d3.v7.min.js"></script>


<style>

:root {

--bg:#f8fafc;
--blue:#3b82f6;
--orange:#f59e0b;
--red:#ef4444;
--text:#111827;
--muted:#6b7280;

}


body {

margin:0;

font-family:
-apple-system,
BlinkMacSystemFont,
"Segoe UI",
Roboto,
sans-serif;

background:var(--bg);

overflow:hidden;

}


/* HEADER */

#header {

position:fixed;

top:0;

left:0;

width:100%;

padding:14px 20px;

background:
rgba(255,255,255,.85);

backdrop-filter:blur(8px);

border-bottom:
1px solid #e5e7eb;

z-index:5;

}


#header h1 {

margin:0;

font-size:20px;

font-weight:700;

}


#header p {

margin:4px 0 0;

font-size:12px;

color:var(--muted);

}


/* GRAPH */

svg {

width:100vw;

height:100vh;

}



.node {

stroke:white;

stroke-width:1.5px;

cursor:grab;

}



.link {

stroke:#cbd5e1;

stroke-opacity:.7;

}



.label {

font-size:14px; /* ⭐ CHANGE TEXT SIZE HERE */

fill:#111827;

pointer-events:none;

font-weight:600;

opacity:0;

}



/* HELP TEXT */

#hint {

position:fixed;

bottom:15px;

right:15px;

background:white;

padding:8px 12px;

border-radius:10px;

font-size:12px;

color:#6b7280;

box-shadow:
0 4px 12px rgba(0,0,0,.08);

}



/* BIOGRAPHY PANEL */


#bioPanel {

position:fixed;

top:0;

right:-520px;

width:500px;

height:100%;


background:white;


box-shadow:
-10px 0 35px rgba(0,0,0,.18);


transition:
right .35s ease;


z-index:20;


display:flex;

flex-direction:column;


}



#bioPanel.open {

right:0;

}




#bioHeader {


height:55px;


display:flex;

align-items:center;

justify-content:space-between;


padding:0 18px;


background:#111827;


color:white;


font-weight:600;


}




#closeBio {


border:none;

background:none;

color:white;

font-size:28px;

cursor:pointer;


}



#bioFrame {


width:100%;

height:calc(100% - 55px);


border:none;


}



</style>


</head>



<body>


<div id="header">

<h1>
Random Network of Pedagogues
</h1>

<p>
Hover to identify • Drag nodes • Click a pedagogue to explore biography
</p>

</div>



<div id="hint">

Click any node

</div>




<!-- BIO PANEL -->


<div id="bioPanel">


<div id="bioHeader">

<span>
Pedagogue Biography
</span>


<button id="closeBio">
×
</button>


</div>



<iframe
id="bioFrame"
src="">
</iframe>



</div>




<svg></svg>



<script>


const width =
window.innerWidth;


const height =
window.innerHeight;



const svg =
d3.select("svg");





d3.json("network.json")

.then(data=>{


console.log(data);




const simulation =

d3.forceSimulation(data.nodes)


.force(

"link",

d3.forceLink(data.links)

.id(d=>d.id)

.distance(120)

)



.force(

"charge",

d3.forceManyBody()

.strength(-100)

)



.force(

"center",

d3.forceCenter(
width/2,
height/2
)

)



.force(

"collision",

d3.forceCollide()

.radius(10)

);







/* DRAG */


function dragstarted(event,d){


if(!event.active)

simulation.alphaTarget(.3)
.restart();


d.fx=d.x;

d.fy=d.y;


}




function dragged(event,d){


d.fx=event.x;

d.fy=event.y;


}




function dragended(event,d){


if(!event.active)

simulation.alphaTarget(0);



d.fx=null;

d.fy=null;


}







/* LINKS */


const link =

svg.append("g")

.selectAll("line")

.data(data.links)

.join("line")

.attr("class","link");







/* NODES */


const node =

svg.append("g")

.selectAll("circle")

.data(data.nodes)

.join("circle")


.attr("class","node")


.attr("r",6)  
// ⭐ CHANGE DEFAULT NODE SIZE HERE


.attr(
"fill",
"#3b82f6"
)



.call(

d3.drag()

.on("start",dragstarted)

.on("drag",dragged)

.on("end",dragended)

);






/* LABELS */


const label =

svg.append("g")

.selectAll("text")

.data(data.nodes)

.join("text")


.attr("class","label")


.text(d=>d.id);







/* HOVER */


node.on(

"mouseover",

function(event,d){



d3.select(this)

.attr("fill","#f59e0b")

.attr("r",15);//  CHANGE HIGHLIGHT SIZE HERE




label

.style(

"opacity",

l=>l===d ? 1:0

);



}

);





node.on(

"mouseout",

function(){


node

.attr("fill","#3b82f6")

.attr("r",6);


label

.style("opacity",0);



}

);







/* CLICK OPEN SIDE PANEL */


node.on(

"click",

function(event,d){



node.attr(
"fill",
"#3b82f6"
);



d3.select(this)

.attr(
"fill",
"#ef4444"
);




const frame =

document.getElementById(
"bioFrame"
);



frame.src =

"bio.html?search=" +

encodeURIComponent(d.id);




document

.getElementById("bioPanel")

.classList

.add("open");



}

);







/* CLOSE PANEL */


document

.getElementById("closeBio")

.onclick=function(){


document

.getElementById("bioPanel")

.classList

.remove("open");



document

.getElementById("bioFrame")

.src="";


};








/* TICK */


simulation.on(

"tick",

()=>{


link

.attr(
"x1",
d=>d.source.x
)

.attr(
"y1",
d=>d.source.y
)

.attr(
"x2",
d=>d.target.x
)

.attr(
"y2",
d=>d.target.y
);



node

.attr(
"cx",
d=>d.x
)

.attr(
"cy",
d=>d.y
);




label

.attr(
"x",
d=>d.x+8
)

.attr(
"y",
d=>d.y+3
);



}


);



})


.catch(error=>{


console.error(
"network.json error:",
error
);


});



</script>



</body>

</html>
